<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Card For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="stage" class="stage">

    <!-- ============ SCENE 0: BIRTHDAY SPLASH ============ -->
    <section id="splash-scene" class="scene splash-scene">
      <div class="splash-text">
        <svg class="splash-arch" viewBox="0 0 500 125" overflow="visible" xmlns="http://www.w3.org/2000/svg" aria-label="happy birthday">
          <defs>
            <path id="arch-path" d="M 20,120 A 280,280 0 0,0 480,120"/>
          </defs>
          <text font-family="'Fraunces', serif" font-size="50" font-weight="700" fill="#E2C07D" letter-spacing="3">
            <textPath href="#arch-path" startOffset="50%" text-anchor="middle">happy birthday</textPath>
          </text>
        </svg>
        <h1 class="splash-name">Tiff</h1>
        <p class="splash-sub">my butterfly</p>
      </div>
      <div id="balloons" class="balloons-wrap"></div>
      <p class="splash-hint">pop all the balloons ✦</p>
    </section>

    <!-- ============ SCENE 1: QUIZ GATE ============ -->
    <section id="quiz-scene" class="scene quiz-scene" hidden>
      <div class="envelope">
        <div class="seal" id="seal" aria-hidden="true">
          <svg viewBox="0 0 100 100" class="seal-svg">
            <circle cx="50" cy="50" r="46" class="seal-ring" />
            <path id="seal-crack" class="seal-crack" d="" />
          </svg>
        </div>

        <div class="quiz-card" id="quiz-card">
          <p class="quiz-eyebrow">
            Question <span id="q-index">1</span> / <span id="q-total">4</span>
          </p>

          <div class="progress-dots" id="progress-dots" aria-hidden="true"></div>

          <h1 id="q-text" class="quiz-question">Loading…</h1>

          <div id="q-options" class="quiz-options" role="group" aria-label="Answer choices"></div>

          <p id="q-feedback" class="quiz-feedback" aria-live="polite"></p>
        </div>
      </div>
    </section>

    <!-- ============ SCENE 2: FLIP BOOK ============ -->
    <section id="book-scene" class="scene book-scene" hidden>

      <div class="audio-bar" id="audio-bar">
        <span class="audio-dot"></span>
        <span id="audio-label">playing — <span id="song-title">our song</span></span>
        <button id="mute-btn" class="mute-btn" aria-label="Mute song">🔊</button>
      </div>

      <div class="book-wrap">
        <div class="book" id="book"></div>
      </div>

      <div class="book-controls">
        <button id="prev-btn" class="nav-btn" aria-label="Previous page">‹</button>
        <p class="page-indicator">
          <span id="page-current">1</span> <span class="page-sep">/</span> <span id="page-total">1</span>
        </p>
        <button id="next-btn" class="nav-btn" aria-label="Next page">›</button>
      </div>
    </section>

  </div>

  <audio id="intro-song" preload="auto" loop></audio>
  <audio id="song" preload="auto" loop></audio>

  <div id="cursor-butterfly" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="40" viewBox="0 0 48 40">
      <g class="bf-wings-left">
        <ellipse cx="14" cy="14" rx="13" ry="9.5" fill="white" fill-opacity="0.88" transform="rotate(-22 14 14)"/>
        <ellipse cx="11" cy="28" rx="9" ry="6" fill="white" fill-opacity="0.72" transform="rotate(18 11 28)"/>
      </g>
      <g class="bf-wings-right">
        <ellipse cx="34" cy="14" rx="13" ry="9.5" fill="white" fill-opacity="0.88" transform="rotate(22 34 14)"/>
        <ellipse cx="37" cy="28" rx="9" ry="6" fill="white" fill-opacity="0.72" transform="rotate(-18 37 28)"/>
      </g>
      <ellipse cx="24" cy="20" rx="2.2" ry="10" fill="white"/>
      <path d="M24 10 Q19 4 15 2" stroke="white" stroke-width="1.2" fill="none" stroke-opacity="0.85"/>
      <path d="M24 10 Q29 4 33 2" stroke="white" stroke-width="1.2" fill="none" stroke-opacity="0.85"/>
      <circle cx="15" cy="2" r="2" fill="white" fill-opacity="0.85"/>
      <circle cx="33" cy="2" r="2" fill="white" fill-opacity="0.85"/>
    </svg>
  </div>

  <script src="script.js"></script>
</body>
</html>
